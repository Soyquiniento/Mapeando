<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Emergencia Offline</title>
    <link rel='stylesheet' href='https://unpkg.com' />
    <script src='https://unpkg.com'></script>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; background: #222; }
        
        /* Estilo del menú de descarga */
        #menu-descarga {
            position: absolute;
            top: 70px;
            left: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-family: sans-serif;
            width: 200px;
        }
        #btn-descarga-ba {
            padding: 10px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
        }
        #progreso-container {
            margin-top: 10px;
            display: none;
            text-align: center;
        }
        #barra-fondo {
            background: #eee;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        #barra-progreso {
            background: #28a745;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Menú de descarga flotante -->
    <div id="menu-descarga">
        <button id="btn-descarga-ba">Descargar Bs. As. (Gratis)</button>
        <div id="progreso-container">
            <span style="font-size: 12px;">Descargando: <b id="porcentaje">0</b>%</span>
            <div id="barra-fondo"><div id="barra-progreso"></div></div>
        </div>
    </div>

    <script>
        // 1. Inicializar el Mapa
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://maplibre.org', // Estilo básico que funciona offline si se cachea
            center: [-58.445, -34.603], // Buenos Aires
            zoom: 10
        });

        // 2. Agregar control de GPS (Ubicación en tiempo real)
        const geolocate = new maplibregl.GeolocateControl({
            positionOptions: { enableHighAccuracy: true },
            trackUserLocation: true,
            showUserHeading: true
        });
        map.addControl(geolocate);

        // 3. Marcador de Destino (Clic en el mapa)
        let marcadorDestino;
        map.on('click', (e) => {
            if (marcadorDestino) marcadorDestino.remove();
            marcadorDestino = new maplibregl.Marker({ color: 'red' })
                .setLngLat(e.lngLat)
                .addTo(map);
        });

        // 4. Lógica de Descarga Offline
        const LIMITES_BA = {
            minLat: -35.0, maxLat: -34.3,
            minLon: -59.0, maxLon: -57.8,
            minZoom: 12, maxZoom: 15
        };

        document.getElementById('btn-descarga-ba').addEventListener('click', () => {
            document.getElementById('progreso-container').style.display = 'block';
            
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'DESCARGAR_REGION',
                    region: LIMITES_BA
                });
            } else {
                alert("El sistema no está listo. Recarga la página o intenta en un momento.");
            }
        });

        // Escuchar el progreso enviado por el Service Worker
        if (navigator.serviceWorker) {
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data.type === 'PROGRESO') {
                    const valor = event.data.valor;
                    document.getElementById('porcentaje').innerText = valor;
                    document.getElementById('barra-progreso').style.width = valor + '%';
                    
                    if (valor === 100) {
                        alert("¡Buenos Aires descargado correctamente!");
                        document.getElementById('btn-descarga-ba').innerText = "Bs. As. Guardado ✓";
                    }
                }
            });
        }

        // 5. Registrar el Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("Service Worker Activo");
            });
        }
    </script>
</body>
</html>
